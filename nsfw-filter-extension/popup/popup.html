<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW Filter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <h1>NSFW Filter</h1>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggleEnabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Stats -->
    <div class="stats" id="statsBar">
      <span id="blockedCount">0</span> items blocked on this page
    </div>

    <!-- Sensitivity -->
    <div class="section">
      <label class="section-label">Sensitivity</label>
      <div class="segmented" id="sensitivityGroup">
        <button class="seg-btn" data-value="low">Low</button>
        <button class="seg-btn active" data-value="medium">Medium</button>
        <button class="seg-btn" data-value="high">High</button>
      </div>
      <p class="hint" id="sensitivityHint">Balanced detection — recommended</p>
    </div>

    <!-- Action -->
    <div class="section">
      <label class="section-label">Action</label>
      <div class="segmented" id="actionGroup">
        <button class="seg-btn active" data-value="blur">Blur</button>
        <button class="seg-btn" data-value="remove">Remove</button>
      </div>
      <p class="hint" id="actionHint">NSFW content will be heavily blurred</p>
    </div>

    <!-- Whitelist -->
    <div class="section">
      <label class="section-label">Whitelisted Domains</label>
      <div class="input-row">
        <input type="text" id="whitelistInput" placeholder="example.com">
        <button id="addWhitelist" class="btn-add">+</button>
      </div>
      <div class="tag-list" id="whitelistTags"></div>
    </div>

    <!-- Blocked Keywords -->
    <div class="section">
      <label class="section-label">Blocked Keywords</label>
      <div class="input-row">
        <input type="text" id="keywordInput" placeholder="keyword to block">
        <button id="addKeyword" class="btn-add">+</button>
      </div>
      <div class="tag-list" id="keywordTags"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button id="rescanBtn" class="btn-secondary">Rescan Page</button>
      <span class="version">v1.0.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
